name: sync

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update formula
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/sync-from-release.sh
          eval "$(./scripts/sync-from-release.sh)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cxr.rb
          git commit -m "Update cxr to v${{ steps.sync.outputs.version }}"
          git push
